name: Staging - Migrator (build-push)

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Git tag to build (e.g. v1.2.3)'
        required: false
        type: string

jobs:
  build-image:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push to GitHub Container Registry
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.migrator
          platforms: linux/amd64
          push: true
          provenance: false
          tags: |
            ghcr.io/${{ github.repository }}/cauldron-stg-migrator:latest
            ghcr.io/${{ github.repository }}/cauldron-stg-migrator:${{ inputs.tag || github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
